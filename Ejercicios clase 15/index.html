<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clase 15</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Lista de Posts</h1>
      <ul id="lista"></ul>
      <h3>Crear un nuevo post</h3>
      <form id="formulario">
        <input
          type="text"
          id="titulo"
          placeholder="Ingrese el título del post"
        />
        <input
          type="text"
          id="contenido"
          placeholder="Ingrese el contenido del post"
        />
        <button id="boton" type="submit">Agregar</button>
      </form>
      <p id="mensaje"></p>
    </div>
  </body>
  <script src="main.js"></script>
</html>
