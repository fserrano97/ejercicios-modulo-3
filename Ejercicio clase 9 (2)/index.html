<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad 2 (Clase 9)</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav class="navbar" role="navigation">
        <div class="navbar-brand">
          <!-- BUTTON BURGUER -->
          <a
            role="button"
            class="navbar-burger"
            aria-label="menu"
            aria-expanded="false"
            data-target="navMenu"
          >
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <!-- MENU-->
        <div id="navMenu" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item" href="#">Inicio</a>
            <a class="navbar-item" href="#">Acerca de</a>
            <a class="navbar-item" href="#">Contacto</a>
          </div>

          <div class="navbar-end">
            <div class="navbar-item">
              <button class="button is-primary"><a class="has-text-dark" href="#">Login</a></button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-5">
        <div class="columns is-centered">

            <div class="column is-half">
 <div class="field">
        <h2 class="title is-3">Contáctanos</h2>

        <div class="field-body">
          <div class="field">
            <p class="control has-icons-left">
              <input class="input" type="text" placeholder="Nombre Completo" />
              <span class="icon is-small is-left">
                <i class="fas fa-user"></i>
              </span>
            </p>
          </div>
          <div class="field">
            <p class="control has-icons-left has-icons-right">
              <input
                class="input"
                type="email"
                placeholder="Correo Electrónico"
              />
              <span class="icon is-small is-left">
                <i class="fas fa-envelope"></i>
              </span>
            </p>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="label">Mensaje</label>

        <div class="field-body">
          <div class="field">
            <div class="control">
              <textarea
                class="textarea"
                placeholder="Explique cómo podemos ayudarle"
              ></textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <div class="control">
          <button class="button is-danger">Enviar</button>
        </div>
      </div>
        </div>
            </div>
     
    </main>
  </body>
  <script src="main.js"></script>
</html>
