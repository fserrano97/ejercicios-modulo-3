<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Clase 9</title>
  </head>
  <body >
    <header id="init">
  <nav class="navbar" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a href="#" class="navbar-item">
        <img src="/images/sandwich_2765691.png" width="30" alt="" />
      </a>

      <a role="button" class="navbar-burger" data-target="navbarMenu">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>

        <div id="navbarMenu" class="navbar-menu">
          <div class="navbar-end">
            <a href="#init" class="navbar-item">Inicio</a>
            <a href="#" class="navbar-item">Acerca de</a>
            <a href="#" class="navbar-item">Contacto</a>

            <div class="navbar-item">
              <div class="buttons">
                <a href="#" class="button is-primary">
                  <strong>Iniciar Sesión</strong>
                </a>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <div class="field box mt-5 small">
        <h1 class="title has-text-danger">Registrate</h1>
        <form action="https://formspree.io/f/xxxxxxx" method="post">
          <label class="label" for="name">Nombre Completo</label>
          <div class="control has-icons-left">
            <input
              class="input has-icons-left has-icons-right"
              type="text"
              id="name"
              name="name"
              placeholder="Ingrese su nombre completo"
            /><br /><br />

            <span class="icon is-left">
              <i class="fas fa-user"></i>
            </span>
          </div>

          <label class="label" for="email">Correo Electronico:</label>
          <div class="control has-icons-left">
            <input
              class="input"
              type="email"
              id="email"
              name="email"
              placeholder="Ingrese su correo electronico"
            />
            <span class="icon is-left">
              <i class="fas fa-envelope"></i>
            </span>
          </div>
          <br />

          <label class="label" for="password">Contraseña:</label>
          <input
            class="input"
            type="password"
            id="password"
            name="password"
            placeholder="Ingrese su contraseña"
          /><br /><br />
          <label class="label" for="confirm_password"
            >Confirmar contraseña:</label
          >
          <input
            class="input"
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Confirme su contraseña"
          /><br /><br />
          <label class="label" for="message"
            >Escribe una descripcion sobre tu mismo/a</label
          >
          <textarea
            class="textarea"
            name="message"
            id="message"
            placeholder="Ingrese un mensaje"
          ></textarea
          ><br />
          <button class="button is-primary" type="submit">Enviar</button>
        </form>
      </div>
    </main>
  </body>
  <script src="/main.js"></script>
</html>
